# Phase-2 file: the HTTPS serving block the panel emits ONCE the cert is
# `ready`. Carries NO `acme` directive (issuance is the collector's job) — only
# the $acme_cert_* variables. run.sh copies this into http.d and reloads after
# issuance, then curls https to prove end-to-end serving with the issued cert.
server {
    listen 443 ssl;
    server_name test.example.com;
    ssl_certificate     $acme_cert_web;
    ssl_certificate_key $acme_cert_key_web;
    location / {
        return 200 "angie-panel e2e: https served with issued cert\n";
    }
}
