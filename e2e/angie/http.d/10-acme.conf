# Mirrors angie-panel's generator output for one http-01 certificate
# (generator::gen_acme), with the ACME directory pointed at pebble instead of
# Let's Encrypt. The collector server block on a unix socket carries `acme` +
# `server_name` (authoritative SAN) and drives issuance; it never serves
# traffic. This is the exact structure the panel emits.
# retry_after_error is 5s (vs the 2h default) so the harness converges fast
# when pebble isn't ready at Angie's first attempt. The panel keeps the 2h
# default in production.
acme_client web https://pebble:14000/dir retry_after_error=5s;
server {
    listen unix:/run/angie-panel/acme-web.sock;
    server_name test.example.com;
    acme web;
}
