# A plain :80 host for test.example.com. Pre-issuance the panel keeps hosts
# HTTP-only (the `ready` gate); this file stands in for that state. The http-01
# challenge is intercepted by the ACME module at POST_READ, before `return`.
server {
    listen 80;
    server_name test.example.com;
    location / {
        return 200 "angie-panel e2e: http host up\n";
    }
}

# Local status API so the harness can observe acme_clients issuance state.
server {
    listen 8100;
    location /status/ {
        api /status/;
    }
}
