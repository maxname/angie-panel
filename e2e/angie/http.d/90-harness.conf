# HARNESS SCAFFOLD — deliberately NOT generator output, unlike its siblings.
#
# Everything the test needs that the panel does not emit: an origin for the
# generated host to proxy to, and the status API the panel would normally reach
# over its own loopback. Keeping this apart from the generated files is the
# point — anything the panel really writes must come from the generator, so it
# cannot drift (see generator::tests::e2e_host_fixtures_are_generator_output).

# The origin. The generated host's upstream points here (127.0.0.1:8080), so a
# 200 through it proves the generated proxy_pass actually reached a backend.
server {
    listen 8080;
    location / {
        return 200 "angie-panel e2e origin\n";
    }
}

# Status API, so the harness can watch acme_clients converge.
server {
    listen 8100;
    location /status/ {
        api /status/;
    }
}
