# Base Angie config for the ACME e2e harness. Mirrors the packaged layout:
# angie.conf owns nothing but the includes; angie-panel owns http.d/*.conf.
worker_processes  1;
error_log  /var/log/angie/error.log notice;
pid        /run/angie.pid;

events {
    worker_connections  1024;
}

http {
    # Docker's embedded DNS — lets acme_client resolve the "pebble" hostname
    # of the ACME directory URI (mirrors the panel emitting a resolver).
    resolver 127.0.0.11 ipv6=off valid=10s;

    # The angie-panel-managed files (generated by our generator).
    include /etc/angie/http.d/*.conf;
    # Writable (tmpfs) spot for the phase-2 HTTPS serving block.
    include /etc/angie/extra.d/*.conf;
}
