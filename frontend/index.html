<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Hand-tuned per slot rather than one file scaled: at 16px the mark needs
         the whole square, while iOS masks its own corners off the 180px one and
         needs the margins left for it. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The light --background: this is what paints before JS runs. From then
         on ThemeProvider keeps it in sync with the active theme. -->
    <meta name="theme-color" content="#FDF8F5" />
    <title>Angie Panel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
