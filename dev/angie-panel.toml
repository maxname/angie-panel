# Local development config: cd backend && cargo run -- serve --config ../dev/angie-panel.toml
bind_addr = "127.0.0.1"
# 8080 is commonly taken (Docker/OrbStack); use 8090 for the dev panel.
port = 8090
data_dir = "../dev-data"
# Vite dev server origin must pass the Origin check:
allowed_hosts = ["localhost", "127.0.0.1"]

[angie]
# Adjust if you have Angie installed locally; probes degrade gracefully if not.
bin = "/usr/sbin/angie"
http_d_dir = "/etc/angie/http.d"
angie_conf = "/etc/angie/angie.conf"
status_api_url = "http://127.0.0.1:8100/status"
# Dev fixture dataset (relative to the backend/ cwd). The package ships the full
# set at /usr/share/angie-panel/geoip-countries.csv.
geoip_data = "data/geoip-countries.csv"
