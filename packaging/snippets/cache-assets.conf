# cache-assets.conf — shipped with angie-panel, included by absolute path
# inside a proxy host's main `location` block when "Cache assets" is enabled.
#
# Package-owned and read-only. These are directives only (no location / no
# proxy_pass): they attach edge caching to the surrounding location, which
# already carries the proxy_pass to the host's upstream. Caching uses the
# `assets` keys_zone declared in 00-panel.conf.
#
# Safe defaults: respects upstream Cache-Control, never caches or serves
# cached content for requests carrying Authorization.
#
# No add_header here, deliberately. add_header only inherits down while the
# lower level declares none of its own, so a single one in this snippet — it
# used to carry X-Cache-Status — silently drops every header the server block
# adds: HSTS, Alt-Svc and the operator's own custom headers. The generator
# emits X-Cache-Status at server scope instead, alongside those.

proxy_cache assets;
proxy_cache_valid 200 301 302 7d;
proxy_cache_valid any 1m;
proxy_cache_revalidate on;
proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
proxy_cache_lock on;
proxy_no_cache $http_authorization;
proxy_cache_bypass $http_authorization;
