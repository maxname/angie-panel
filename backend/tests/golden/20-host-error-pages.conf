upstream host_20 {
    zone host_20 64k;
    server 192.168.1.10:8080;
}

server {
    listen 80;
    server_name app.example.com;
    status_zone host_20;
    proxy_intercept_errors on;
    error_page 404 = @ap_err_404;
    error_page 500 502 503 504 = @ap_err_5xx;
    location @ap_err_404 {
        default_type text/html;
        return 404 "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Not &lt;here&gt;</title></head><body style='font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0f19;color:#e5e7eb;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center'><main style='max-width:32rem;padding:2rem'><h1 style='font-size:1.5rem;margin:0 0 .75rem'>Not &lt;here&gt;</h1><p style='color:#9ca3af;line-height:1.6;margin:0'>We couldn&#39;t find that page.</p></main></body></html>";
    }
    location @ap_err_5xx {
        default_type text/html;
        return 503 "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Oops</title></head><body style='font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0f19;color:#e5e7eb;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center'><main style='max-width:32rem;padding:2rem'><h1 style='font-size:1.5rem;margin:0 0 .75rem'>Oops</h1><p style='color:#9ca3af;line-height:1.6;margin:0'>The backend is having trouble.</p></main></body></html>";
    }
    location / {
        proxy_pass http://host_20;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
