upstream host_5 {
    zone host_5 64k;
    server 192.168.1.10:8080;
}

server {
    listen 80;
    server_name multi.example.com;
    status_zone host_5;
    location / {
        proxy_pass http://host_5;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api {
        proxy_pass http://10.0.0.2:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /legacy {
        rewrite ^ /v2 break;
        proxy_pass https://backend.lan:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
