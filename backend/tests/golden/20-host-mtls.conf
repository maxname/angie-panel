upstream host_11 {
    zone host_11 64k;
    server 192.168.1.10:8080;
}

server {
    listen 80;
    server_name mtls.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mtls.example.com;
    status_zone host_11;
    ssl_certificate     $acme_cert_mtls;
    ssl_certificate_key $acme_cert_key_mtls;
    ssl_client_certificate http.d/client-ca-host-11.pem;
    ssl_verify_client on;
    location / {
        proxy_pass http://host_11;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
