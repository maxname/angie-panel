upstream host_20 {
    zone host_20 64k;
    server 192.168.1.10:8080;
}

server {
    listen 80;
    server_name app.example.com;
    status_zone host_20;
    location / {
        default_type text/html;
        add_header Retry-After "3600" always;
        return 503 "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Back &lt;soon&gt;</title></head><body style='font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0f19;color:#e5e7eb;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center'><main style='max-width:32rem;padding:2rem'><h1 style='font-size:1.5rem;margin:0 0 .75rem'>Back &lt;soon&gt;</h1><p style='color:#9ca3af;line-height:1.6;margin:0'>Upgrading the database.</p></main></body></html>";
    }
}
