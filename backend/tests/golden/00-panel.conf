resolver 127.0.0.53 valid=300s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

proxy_cache_path /var/cache/angie-panel-assets levels=1:2 keys_zone=assets:10m max_size=1g inactive=60m;

server {
    listen 127.0.0.1:8100;
    location /status/ {
        api /status/;
        api_config_files on;
    }
}
