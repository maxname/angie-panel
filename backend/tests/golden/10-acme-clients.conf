# ACME clients and their collector server blocks (managed).

# dns-01 certificates: Angie answers ACME DNS queries itself.
acme_dns_port 53;

acme_client web https://acme-v02.api.letsencrypt.org/directory;
server {
    listen unix:/run/angie-panel/acme-web.sock;
    server_name app.example.com www.example.com;
    acme web;
}

acme_client wild https://acme-staging-v02.api.letsencrypt.org/directory challenge=dns email=admin@example.com;
server {
    listen unix:/run/angie-panel/acme-wild.sock;
    server_name *.example.com example.com;
    acme wild;
}

acme_client legacy https://acme-v02.api.letsencrypt.org/directory key_type=rsa enabled=off;
server {
    listen unix:/run/angie-panel/acme-legacy.sock;
    server_name old.example.com;
    acme legacy;
}

