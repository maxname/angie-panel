# SNI router: edge
map $ssl_preread_server_name $sni_router_1 {
    hostnames;
    app.example.com sni_1_0;
    *.internal.example.com sni_1_1;
    default sni_1_default;
}
upstream sni_1_0 { server 10.0.0.10:443; }
upstream sni_1_1 { server 10.0.0.20:8443; }
upstream sni_1_default { server 10.0.0.1:443; }
server {
    listen 443;
    ssl_preread on;
    proxy_pass $sni_router_1;
}
