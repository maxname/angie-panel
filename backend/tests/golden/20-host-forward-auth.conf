upstream host_14 {
    zone host_14 64k;
    server 192.168.1.10:8080;
}

server {
    listen 80;
    server_name app.example.com;
    status_zone host_14;
    error_page 401 = @forward_auth_signin;
    location = /_forward_auth {
        internal;
        proxy_pass http://10.0.0.9:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
    location @forward_auth_signin {
        return 302 https://auth.example.com?rd=$scheme://$http_host$request_uri;
    }
    location / {
        auth_request /_forward_auth;
        auth_request_set $fa_0 $upstream_http_remote_user;
        proxy_set_header Remote-User $fa_0;
        auth_request_set $fa_1 $upstream_http_remote_groups;
        proxy_set_header Remote-Groups $fa_1;
        proxy_pass http://host_14;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
