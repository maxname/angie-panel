upstream host_4 {
    zone host_4 64k;
    least_conn;
    server 192.168.1.10:8080 weight=3 max_fails=2 fail_timeout=20s;
    server 10.0.0.2:8080 max_fails=2 fail_timeout=20s;
    server 10.0.0.3:8080 max_fails=2 fail_timeout=20s backup;
}

server {
    listen 80;
    server_name lb.example.com;
    status_zone host_4;
    location / {
        proxy_pass http://host_4;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
