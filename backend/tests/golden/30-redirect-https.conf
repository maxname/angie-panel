server {
    listen 80;
    server_name go.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name go.example.com;
    ssl_certificate     $acme_cert_go;
    ssl_certificate_key $acme_cert_key_go;
    add_header Strict-Transport-Security "max-age=63072000" always;
    return 302 http://dest.example.com;
}
