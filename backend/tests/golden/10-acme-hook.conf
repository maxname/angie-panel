# ACME clients and their collector server blocks (managed).

acme_client web https://acme-v02.api.letsencrypt.org/directory challenge=dns;
server {
    listen unix:/run/angie-panel/acme-web.sock;
    server_name *.example.com example.com;
    acme web;
    location @acme_hook_location {
        acme_hook web;
        set $ap_acme_hook_url "http://127.0.0.1:8080/acme/hook?t=testtoken&provider=7";
        proxy_pass $ap_acme_hook_url;
        proxy_set_header X-Acme-Hook $acme_hook_name;
        proxy_set_header X-Acme-Challenge $acme_hook_challenge;
        proxy_set_header X-Acme-Domain $acme_hook_domain;
        proxy_set_header X-Acme-Keyauth $acme_hook_keyauth;
    }
}

